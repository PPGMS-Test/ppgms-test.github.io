name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: |
            github-homepage/pnpm-lock.yaml
            applepay-dashboard/pnpm-lock.yaml

      # ── applepay-dashboard ──────────────────────────────────────────
      - name: Install applepay-dashboard dependencies
        working-directory: applepay-dashboard
        run: pnpm install --no-frozen-lockfile

      - name: Build applepay-dashboard
        working-directory: applepay-dashboard
        run: pnpm build

      # ── github-homepage ─────────────────────────────────────────────
      - name: Install github-homepage dependencies
        working-directory: github-homepage
        run: pnpm install --no-frozen-lockfile

      - name: Generate navigation data
        working-directory: github-homepage
        run: pnpm run generate-nav

      - name: Build github-homepage
        working-directory: github-homepage
        run: pnpm run build
        env:
          NODE_ENV: production

      # Merge: applepay-dashboard dist overwrites the stub index.html copied
      # by copyPages, and adds assets/. Vite base = /__1__-jsv5-test/ApplePay/
      - name: Merge applepay-dashboard into dist
        run: |
          mkdir -p github-homepage/dist/__1__-jsv5-test/ApplePay
          cp -r applepay-dashboard/dist/. github-homepage/dist/__1__-jsv5-test/ApplePay/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./github-homepage/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
