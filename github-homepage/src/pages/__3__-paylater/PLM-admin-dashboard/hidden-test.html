<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>PayLater Message Single Simple Test</title>
    </head>
    <body>
        <div id="paypal-message-container"></div>

        <div
            data-pp-message
            data-pp-placement="product"
            data-pp-amount="500.00"
            data-pp-buyercountry="US"
        />

        <script>
            function init() {
                PayPalSDK.Messages({
                    amount: 500,
                    placement: "product",
                    buyerCountry: "IT",
                }).render("#paypal-message-container");
            }
        </script>

        <script
            src="https://www.paypal.com/sdk/js?client-id=test&components=messages"
            data-namespace="PayPalSDK"
            onload="init()"
        ></script>
    </body>
</html>
