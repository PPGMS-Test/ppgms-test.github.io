        <style>
            .container {
                height: 200px;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .info-section {
                display: flex;
                justify-content: center;
                padding: 32px 20px 8px;
            }

            .config-panel {
                background: linear-gradient(135deg, #f8faff 0%, #f0f4ff 100%);
                border: 1px solid #d0d8f0;
                border-radius: 12px;
                padding: 16px 20px;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
                width: 100%;
                max-width: 480px;
                position: relative;
                overflow: hidden;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            }

            .config-panel::before {
                content: '';
                position: absolute;
                top: -30px;
                right: -30px;
                width: 100px;
                height: 100px;
                background: radial-gradient(circle, rgba(79, 100, 241, .12) 0%, transparent 70%);
                pointer-events: none;
            }

            .config-item {
                display: flex;
                flex-direction: column;
                gap: 3px;
            }

            .config-full {
                grid-column: 1 / -1;
            }

            .config-label {
                font-size: 10px;
                color: #6172cd;
                text-transform: uppercase;
                letter-spacing: .08em;
                font-weight: 600;
            }

            .config-value {
                font-size: 13px;
                color: #1a2060;
                font-weight: 500;
                font-family: 'SF Mono', 'Fira Code', monospace;
            }

            .badge-live {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                background: rgba(18, 183, 106, .15);
                color: #027a48;
                border: 1px solid rgba(18, 183, 106, .3);
                border-radius: 20px;
                padding: 2px 10px;
                font-size: 12px;
                font-weight: 700;
                width: fit-content;
            }

            .badge-live::before {
                content: '';
                width: 6px;
                height: 6px;
                background: #12b76a;
                border-radius: 50%;
                animation: live-pulse 2s infinite;
            }

            @keyframes live-pulse {
                0%, 100% { opacity: 1; }
                50% { opacity: .4; }
            }
        </style>
